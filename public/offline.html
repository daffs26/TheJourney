<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koneksi Terputus — TheJourney</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-alt: #1D4ED8;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --text: #0F172A;
      --subtext: #64748B;
      --border: #E2E8F0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0B1120;
        --surface: #1E293B;
        --text: #F1F5F9;
        --subtext: #94A3B8;
        --border: #334155;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      transition: background-color 0.3s ease;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 40px 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .icon-container {
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background-color: rgba(37, 99, 235, 0.1);
      border-radius: 50%;
      color: var(--primary);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--subtext);
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .btn:hover {
      background-color: var(--primary-alt);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .offline-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 4px 8px;
      background-color: #EF4444;
      color: white;
      border-radius: 100px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="offline-badge">Offline Mode</div>
    <div class="icon-container">
      <!-- Wifi Off Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"></path>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"></path>
        <path d="M5 12.5a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1>Koneksi Internet Terputus</h1>
    <p>Aplikasi TheJourney membutuhkan koneksi internet untuk memuat halaman ini. Silakan periksa koneksi Wi-Fi atau data seluler Anda, lalu coba lagi.</p>
    <button class="btn" onclick="window.location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
